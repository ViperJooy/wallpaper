<!DOCTYPE html>
<html>
<head>
    <title>API 测试</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>壁纸 API 测试</h1>
    <button onclick="testAPI()">测试 API</button>
    <div id="result"></div>

    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>正在加载...</p>';

            try {
                const response = await fetch('https://wp.shanhutech.cn/intf/GetListByCategory?cids=36&pageno=1&count=5');
                const data = await response.json();

                console.log('API Response:', data);

                if (data && data.data && data.data.list) {
                    resultDiv.innerHTML = `
                        <h2>成功！</h2>
                        <p>找到 ${data.data.list.length} 张壁纸</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <h2>数据结构错误</h2>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <h2>错误</h2>
                    <p>${error.message}</p>
                `;
                console.error('Error:', error);
            }
        }

        // 自动测试
        window.onload = () => {
            testAPI();
        };
    </script>
</body>
</html>
